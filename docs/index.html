<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Precios Combustible</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>Precios de Combustible</h1>
    <button id="menu-btn" class="menu-btn">☰</button>
  </header>

  <!-- Menú Hamburguesa (solo una opción) -->
  <nav id="menu" class="menu">
    <a href="https://github.com/tuusuario/tu-repo/issues" target="_blank" class="menu-item">
      Reportar un error
    </a>
  </nav>

  <div id="info-bar" class="info-bar">
    <div class="selector-row">
      <span class="label">Combustible:</span>
      <span id="combustible-actual" class="value">Ninguno seleccionado</span>
      <button id="btn-cambiar-combustible" class="btn-cambiar">Cambiar</button>
    </div>

    <div class="selector-row">
      <span class="label">Ubicación:</span>
      <span id="ubicacion-actual" class="value">No seleccionada</span>
      <button id="btn-cambiar-ubicacion" class="btn-cambiar">Cambiar</button>
    </div>

    <div class="fecha-row">
      Actualizado: <strong id="fecha-actualizacion">Cargando...</strong>
    </div>
  </div>

  <main>
    <table id="tabla-precios">
      <thead>
        <tr>
          <th>Estación</th>
          <th>Distancia</th>
          <th>Precio</th>
          <th>Verificar</th>
          <th>Ir</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <!-- Modal Combustible -->
  <div id="modal-combustible" class="modal">
    <div class="modal-content">
      <h3>Selecciona el combustible</h3>
      <button data-combustible="Gasolina 95" class="modal-option">Gasolina 95</button>
      <button data-combustible="Gasolina 95 Premium" class="modal-option">Gasolina 95 Premium</button>
      <button data-combustible="Diésel" class="modal-option">Diésel</button>
      <button data-combustible="Diésel Premium" class="modal-option">Diésel Premium</button>
      <button id="cancelar-combustible" class="btn-cancelar">Cancelar</button>
    </div>
  </div>

  <!-- Modal Ubicación -->
  <div id="modal-ubicacion" class="modal">
    <div class="modal-content">
      <h3>Selecciona la ubicación</h3>
      <button id="modal-geoloc" class="modal-option">📍 Usar mi ubicación actual</button>
      <div class="cp-container">
        <input type="text" id="modal-codigo-postal" placeholder="Código postal (ej: 28001)" maxlength="5">
        <button id="modal-buscar-cp" class="modal-option">Buscar por CP</button>
      </div>
      <button id="cancelar-ubicacion" class="btn-cancelar">Cancelar</button>
    </div>
  </div>

  <script src="logic.js"></script>
</body>
</html>
