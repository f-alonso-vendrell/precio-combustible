<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Precios Combustible</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <header>
    <h1>Precios de Combustible</h1>
    <button id="menu-btn" class="menu-btn">☰</button>
  </header>

  <nav id="menu" class="menu">
    <div class="menu-section">
      <h3>Combustible</h3>
      <button data-combustible="Gasolina 95" class="combustible-btn">Gasolina 95</button>
      <button data-combustible="Gasolina 98" class="combustible-btn">Gasolina 98</button>
      <button data-combustible="Diésel" class="combustible-btn">Diésel</button>
      <button data-combustible="Diésel Premium" class="combustible-btn">Diésel Premium</button>
    </div>

    <div class="menu-section">
      <h3>Ubicación</h3>
      <button id="btn-geoloc-menu" class="ubicacion-btn">📍 Usar mi ubicación actual</button>
      <div class="cp-option">
        <input type="text" id="codigo-postal" placeholder="Código postal (ej: 28001)" maxlength="5">
        <button id="btn-cp-menu" class="ubicacion-btn">Buscar por CP</button>
      </div>
    </div>
  </nav>

  <div id="info-bar" class="info-bar">
    <div id="info-combustible" class="info-item">Combustible: <strong>Ninguno seleccionado</strong></div>
    <div id="info-ubicacion" class="info-item">Ubicación: <strong>No seleccionada</strong></div>
    <div id="info-fecha" class="info-item">Actualizado: <strong>Cargando...</strong></div>
  </div>

  <main>
    <table id="tabla-precios">
      <thead>
        <tr>
          <th>Estación</th>
          <th>Distancia</th>
          <th>Precio</th>
          <th>Verificar</th>
          <th>Ir</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script src="logic.js"></script>
</body>
</html>
