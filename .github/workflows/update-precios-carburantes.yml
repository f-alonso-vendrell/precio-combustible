name: Actualizar Precios Carburantes

on:
  schedule:
    - cron: '0 5 * * *'        # Todos los días a las 5:00 UTC (7:00 España)
  workflow_dispatch:           # Permite ejecución manual

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Descargar datos oficiales del Ministerio
        run: |
          mkdir -p docs
          curl -H "Accept: application/json" \
               -H "User-Agent: GitHub-Actions-PrecioCombustible" \
               -o docs/precios-carburantes.json \
               "https://sedeaplicaciones.minetur.gob.es/ServiciosRESTCarburantes/PreciosCarburantes/EstacionesTerrestres/"

      - name: Commit y Push si hay cambios
        uses: EndBug/add-and-commit@v9
        with:
          add: 'docs/precios-carburantes.json'
          message: 'Actualización automática de precios carburantes - $(date +"%Y-%m-%d %H:%M")'
          default_author: github_actions
          github_token: ${{ secrets.GITHUB_TOKEN }}